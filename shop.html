<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ECEAE6;
  --card:#F7F6F2;
  --white:#FEFEFE;
  --ink:#2E2E2E;
  --ink2:#5E5E5A;
  --ink3:#9E9E98;
  --rule:#D8D6D0;
  --green:#82B7CC;
  --green-dk:#5A9AB5;
  --yellow:#F5D46B;
  --yellow-dk:#D4A828;
  --accent:#5A9AB5;
}
html,body{background:var(--bg);color:var(--ink);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;font-family:'Noto Sans TC',sans-serif}

/* ── Loading ── */
#loading-veil{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .35s ease}
#loading-veil.fade{opacity:0;pointer-events:none}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin:0 4px;animation:ldot 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── Top strip ── */
.shop-strip{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,0,0,.06);
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:95;
}
.shop-strip-back{
  display:flex;align-items:center;gap:4px;
  padding:6px 10px 6px 6px;border-radius:7px;
  border:none;background:none;color:var(--ink2);
  font-size:12px;font-family:inherit;cursor:pointer;
  text-decoration:none;flex-shrink:0;
}
.shop-strip-back svg{width:16px;height:16px;stroke:var(--ink2);flex-shrink:0}
.shop-strip-title{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--ink);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shop-strip-menu{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:8px;border:none;
  background:none;cursor:pointer;flex-shrink:0;color:var(--ink);
  font-size:20px;line-height:1;
}

/* ── Hamburger menu ── */
.hmenu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.hmenu-overlay.on{opacity:1;pointer-events:auto}
.hmenu-drawer{
  position:fixed;top:0;right:0;bottom:0;width:240px;
  background:var(--white);z-index:201;
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;
  max-width:100vw;
}
.hmenu-drawer.on{transform:translateX(0)}
.hmenu-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 16px 14px;border-bottom:1px solid var(--rule);
}
.hmenu-head-title{font-size:12px;color:var(--ink3);letter-spacing:1px;font-weight:300}
.hmenu-close{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--bg);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:16px;color:var(--ink2);
}
.hmenu-links{flex:1;overflow-y:auto;padding:8px 0}
.hmenu-link{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;text-decoration:none;
  color:var(--ink);font-size:14px;font-weight:400;
  border:none;background:none;width:100%;
  font-family:inherit;cursor:pointer;text-align:left;
  border-bottom:1px solid rgba(0,0,0,.04);
  transition:background .15s;
}
.hmenu-link:last-child{border-bottom:none}
.hmenu-link:active{background:var(--bg)}
.hmenu-link.current{color:var(--green-dk);font-weight:500}
.hmenu-link-icon{width:18px;height:18px;flex-shrink:0;opacity:.6}
.hmenu-link.current .hmenu-link-icon{opacity:1}

/* ── Hero ── */
.shop-hero{
  padding:74px 20px 24px;
  background:var(--white);
  border-bottom:1px solid var(--rule);
  text-align:center;
}
.shop-hero-title{
  font-family:'Noto Sans TC',sans-serif;
  font-size:22px;font-weight:500;
  color:var(--ink);letter-spacing:1px;
  line-height:1.4;margin-bottom:8px;
}
.shop-hero-sub{
  font-size:12px;color:var(--ink3);
  font-weight:300;letter-spacing:.5px;
  line-height:1.6;
}
.shop-hero-deco{
  display:flex;align-items:center;gap:8px;
  justify-content:center;margin-bottom:12px;
}
.shop-hero-line{flex:1;max-width:48px;height:1px;background:var(--rule)}
.shop-hero-dot{width:5px;height:5px;border-radius:50%;background:var(--yellow)}

/* ── Category filter ── */
.shop-cats{
  display:flex;gap:8px;padding:14px 16px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;background:var(--white);
  border-bottom:1px solid var(--rule);
  position:sticky;top:57px;z-index:50;
}
.shop-cats::-webkit-scrollbar{display:none}
.shop-cat-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--rule);background:none;
  font-size:12px;font-family:inherit;
  color:var(--ink2);cursor:pointer;font-weight:400;
  transition:all .15s;white-space:nowrap;
}
.shop-cat-btn.on{
  background:var(--green);border-color:var(--green);
  color:var(--white);font-weight:500;
}

/* ── Product grid ── */
.shop-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;padding:16px 12px;
}
.shop-card{
  background:var(--card);border-radius:14px;
  overflow:hidden;display:flex;flex-direction:column;
}
.shop-card-img{
  width:100%;aspect-ratio:1;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;overflow:hidden;flex-shrink:0;
}
.shop-card-img img{width:100%;height:100%;object-fit:cover;display:block}
.shop-card-body{padding:10px 10px 12px;flex:1;display:flex;flex-direction:column;gap:6px}
.shop-cat-tag{
  display:inline-block;font-size:9px;
  background:var(--yellow);color:var(--ink);
  border-radius:4px;padding:2px 6px;
  font-weight:500;letter-spacing:.3px;
  align-self:flex-start;
}
.shop-card-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4}
.shop-card-desc{font-size:12px;color:var(--ink3);line-height:1.5;flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.shop-card-btn{
  margin-top:4px;padding:9px 10px;border-radius:8px;
  border:none;background:var(--green);
  color:#fff;font-size:11px;font-weight:500;
  font-family:inherit;cursor:pointer;text-align:center;
  letter-spacing:.3px;width:100%;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s,filter .15s,background .2s;
}
.shop-card-btn.taobao{background:var(--green)}
.shop-card-btn:active,.shop-card-btn.pressing{transform:scale(.93);filter:brightness(.8)}
.shop-card-btn.copied{background:var(--green-dk)!important;transition:background 0s}
.shop-btn-hint{
  font-size:9px;color:var(--ink3);text-align:center;
  margin-top:auto;padding-top:8px;margin-bottom:0;letter-spacing:.3px;line-height:1.4;
}

/* ── Empty state ── */
.shop-empty{
  text-align:center;padding:60px 20px;
  color:var(--ink3);font-size:13px;
}
.shop-empty-icon{font-size:40px;margin-bottom:12px}

/* ── Toast ── */
.shop-toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;font-size:12px;
  padding:10px 20px;border-radius:20px;z-index:500;
  opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;
}
.shop-toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
var SUPABASE_URL = 'https://hkjazchummqlfinyyeys.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhramF6Y2h1bW1xbGZpbnl5ZXlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjY1OTksImV4cCI6MjA5NTE0MjU5OX0.pu87JTWk06uJ8QR5BjFVQhnhVn6PUg5qj1sYC_0pVoE';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var _items = [];
var _activeCat = '';

function toast(msg) {
  var el = document.getElementById('shop-toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('on'); }, 2000);
}

function openMenu() {
  document.getElementById('hmenu-overlay').classList.add('on');
  document.getElementById('hmenu-drawer').classList.add('on');
}
function closeMenu() {
  document.getElementById('hmenu-overlay').classList.remove('on');
  document.getElementById('hmenu-drawer').classList.remove('on');
}

function copyText(text, msg, btn) {
  // Show feedback immediately — don't wait for clipboard promise
  toast(msg);
  if (btn) {
    var orig = btn.textContent;
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  }
  // Copy in background
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(function(){ _fallbackCopy(text); });
  } else {
    _fallbackCopy(text);
  }
}
function _fallbackCopy(text) {
  try {
    var t = document.createElement('textarea');
    t.value = text; t.style.position = 'fixed'; t.style.opacity = '0';
    document.body.appendChild(t);
    t.focus(); t.select();
    document.execCommand('copy');
    document.body.removeChild(t);
  } catch(e) {}
}

function renderCats() {
  var cats = [];
  _items.forEach(function(i){ if (i.category && cats.indexOf(i.category) === -1) cats.push(i.category); });
  var wrap = document.getElementById('shop-cats');
  wrap.innerHTML = '<button class="shop-cat-btn' + (_activeCat === '' ? ' on' : '') + '" data-cat="">全部</button>';
  cats.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'shop-cat-btn' + (c === _activeCat ? ' on' : '');
    btn.dataset.cat = c;
    btn.textContent = c;
    wrap.appendChild(btn);
  });
  wrap.querySelectorAll('.shop-cat-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      _activeCat = b.dataset.cat;
      wrap.querySelectorAll('.shop-cat-btn').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      renderGrid();
    });
  });
}

function renderGrid() {
  var grid = document.getElementById('shop-grid');
  var filtered = _activeCat ? _items.filter(function(i){ return i.category === _activeCat; }) : _items;
  if (!filtered.length) {
    grid.innerHTML = '';
    grid.style.display = 'block';
    grid.innerHTML = '<div class="shop-empty"><div class="shop-empty-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;opacity:.35"><circle cx="24" cy="24" r="20"/><path d="M17 21c0-3.866 3.134-7 7-7s7 3.134 7 7"/><path d="M13 21h22l-2.5 14h-17L13 21z"/></svg></div>這個分類還沒有商品</div>';
    return;
  }
  grid.style.display = 'grid';
  grid.innerHTML = filtered.map(function(item) {
    var imgHtml = item.imgData
      ? '<div class="shop-card-img"><img src="' + _esc(item.imgData) + '" alt="' + _esc(item.name) + '"></div>'
      : '<div class="shop-card-img"><span style="font-size:36px;line-height:1">✦</span></div>';
    var catTag = item.category
      ? '<span class="shop-cat-tag">' + _esc(item.category) + '</span>'
      : '';
    var btnHtml, hintHtml = '';
    if (item.isTaobao) {
      hintHtml = '<div class="shop-btn-hint">一鍵複製，打開淘寶APP搜尋</div>';
      btnHtml = '<button class="shop-card-btn taobao" data-link="' + _esc(item.link) + '" onclick="copyText(this.dataset.link,\'✓ 已複製淘寶連結\',this)">複製淘寶連結</button>';
    } else if (item.link) {
      btnHtml = '<a class="shop-card-btn" href="' + _esc(item.link) + '" target="_blank" rel="noopener" style="display:block;text-decoration:none">+1 跟著買</a>';
    } else {
      btnHtml = '<button class="shop-card-btn" style="opacity:.4;cursor:default" disabled>+1 跟著買</button>';
    }
    return '<div class="shop-card">' +
      imgHtml +
      '<div class="shop-card-body">' +
        catTag +
        '<div class="shop-card-name">' + _esc(item.name) + '</div>' +
        (item.desc ? '<div class="shop-card-desc">' + _esc(item.desc) + '</div>' : '') +
        hintHtml + btnHtml +
      '</div>' +
    '</div>';
  }).join('');
}

function _esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function init() {
  try {
    var res = await sb.from('shop_items').select('*').eq('archived', false).order('sort_order', {ascending:true}).order('created_at', {ascending:true});
    if (res.data) {
      _items = res.data.map(function(i) {
        return {
          id:       i.id,
          name:     i.name       || '',
          desc:     i.description|| '',
          imgData:  i.img_data   || null,
          emoji:    i.emoji      || '✦',
          category: i.category   || '',
          link:     i.link       || '',
          isTaobao: i.is_taobao  || false
        };
      });
    }
  } catch(e) {
    console.error('載入商品失敗', e);
  }
  renderCats();
  renderGrid();
  var veil = document.getElementById('loading-veil');
  if (veil) { veil.classList.add('fade'); setTimeout(function(){ veil.remove(); }, 400); }
}

init();

// iOS-safe tap feedback for buttons
document.addEventListener('touchstart', function(e){
  var btn = e.target.closest && e.target.closest('.shop-card-btn');
  if (btn && !btn.disabled) btn.classList.add('pressing');
}, {passive:true});
function _clearPress(){
  document.querySelectorAll('.shop-card-btn.pressing').forEach(function(b){
    setTimeout(function(){ b.classList.remove('pressing'); }, 140);
  });
}
document.addEventListener('touchend', _clearPress, {passive:true});
document.addEventListener('touchcancel', function(){
  document.querySelectorAll('.shop-card-btn.pressing').forEach(function(b){ b.classList.remove('pressing'); });
}, {passive:true});
</script>
</body>
</html>
